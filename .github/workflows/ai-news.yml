name: AI Agent 每日晚间新闻

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  generate-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装依赖
        run: pip install duckduckgo-search
      - name: 生成并推送到微信
        env:
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          WXPUSHER_TOKEN: ${{ secrets.WXPUSHER_TOKEN }}
          WXPUSHER_UID: ${{ secrets.WXPUSHER_UID }}
        run: python ai_news.py
